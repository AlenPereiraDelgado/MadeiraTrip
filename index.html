<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madeira Pro 2026 | Full Detail & Workflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --apple-bg: #f5f5f7; --accent: #007aff; --nature: #34c759; --text: #1d1d1f; --sub: #86868b; --glass: rgba(255, 255, 255, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Outfit', sans-serif; background: var(--apple-bg); height: 100vh; display: flex; overflow: hidden; }
        
        .left-panel { width: 450px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,0.08); overflow-y: auto; z-index: 1000; position: relative; }
        .right-panel { flex: 1; height: 100vh; position: relative; z-index: 500; }
        
        header { padding: 40px 30px 20px; background: #fff; }
        .day-strip { display: flex; gap: 8px; padding: 20px 30px; overflow-x: auto; scrollbar-width: none; background: #fff; margin-top: -1px; }
        .day-btn { padding: 12px 22px; background: #f2f2f7; border-radius: 50px; font-weight: 800; font-size: 0.8rem; border: none; cursor: pointer; white-space: nowrap; transition: 0.3s; color: var(--sub); }
        .day-btn.active { background: var(--text); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        /* FILTRO PENDIENTE / COMPLETADO */
        .filter-switch-wrap { position: sticky; top: 0; z-index: 100; background: #fff; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .filter-switch { display: flex; background: #f2f2f7; padding: 4px; border-radius: 12px; margin: 0 30px 0; border: 1px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .filter-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 800; font-size: 0.75rem; border-radius: 10px; cursor: pointer; transition: 0.2s; color: var(--sub); }
        .filter-btn.active { background: #fff; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .task-list { padding: 0 30px 120px; display: flex; flex-direction: column; gap: 15px; }
        .task-card { position: relative; height: 140px; border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: #eee; border: 1px solid rgba(0,0,0,0.05); }
        .task-card img.card-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: 0.5s; }
        .task-card:hover img.card-bg { transform: scale(1.05); }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .task-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 80%); z-index: 2; }
        
        .card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; z-index: 2; color: #fff; }
        .card-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 2px; }
        .card-meta { font-size: 0.65rem; font-weight: 800; opacity: 0.9; display: flex; gap: 10px; align-items: center; }

        .btn-check-quick { position: absolute; top: 15px; left: 15px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; z-index: 10; color: rgba(255,255,255,0.5); transition: 0.3s; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .task-card.done { filter: grayscale(0.5); opacity: 0.7; }
        .task-card.done:hover { filter: none; opacity: 1; }
        .task-card.done .btn-check-quick { background: var(--nature); border-color: var(--nature); color: #fff; }
        
        .task-card.optional { border: 2px dashed rgba(0,122,255,0.3); }
        .task-card.optional::after { background: linear-gradient(0deg, rgba(88,86,214,0.85) 0%, transparent 80%); }
        .task-card.optional .card-meta { color: #d0d0ff; }
        .optional-tag { position: absolute; top: 15px; right: 65px; background: rgba(88,86,214,0.3); backdrop-filter: blur(10px); padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 900; color: #fff; text-transform: uppercase; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }

        .drive-tag { position: absolute; bottom: 65px; left: 20px; color: #fff; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 5px; opacity: 0.9; z-index: 5; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; }

        .btn-map-quick { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 10; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); }

        /* MODAL DE DETALLES */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-content { width: 90%; max-width: 440px; background: #fff; border-radius: 32px; overflow: hidden; position: relative; max-height: 85vh; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-overlay.open .modal-content { transform: scale(1) translateY(0); }
        
        .modal-banner { width: 100%; height: 200px; position: relative; overflow: hidden; background: #eee; }
        .modal-banner img { width: 100%; height: 100%; object-fit: cover; }
        .modal-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, #fff 0%, transparent 50%); }
        .modal-padding { padding: 0 30px 40px; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: -20px; position: relative; z-index: 10; }
        .modal-title { font-size: 1.6rem; font-weight: 950; line-height: 1.1; margin-bottom: 8px; letter-spacing: -0.03em; color: var(--text); }
        .modal-desc { font-size: 1rem; color: var(--text); line-height: 1.6; background: #f9f9f9; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); font-weight: 400; }
        .modal-warning { background: #fff1f0; color: #cf222e; padding: 15px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 20px; border: 1px solid #ffd8d6; display: flex; align-items: center; gap: 10px; }

        /* REAL MAP */
        #map { width: 100%; height: 100%; background: #f5f5f7; }
        .map-label-real { background: #1d1d1f; border: none; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 11px; color: #fff; padding: 6px 14px; letter-spacing: 0.3px; border: 1px solid rgba(255,255,255,0.1); }
        .leaflet-tooltip-top.map-label-real::before { border-top-color: #1d1d1f; }
        
        /* PROGRESS BAR */
        .prog-container { width: 100%; height: 6px; background: #f2f2f7; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .prog-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        /* FLOATING LAYER SELECTOR */
        .layer-fab { position: absolute; top: 25px; right: 25px; width: 50px; height: 50px; background: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; z-index: 1500; cursor: pointer; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; color: var(--text); }
        .layer-fab:hover { transform: scale(1.05); background: #f9f9f9; }
        .layer-menu { position: absolute; top: 85px; right: 25px; width: 180px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 22px; padding: 12px; z-index: 1500; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: none; opacity: 0; transform: translateY(-10px); transition: 0.3s; }
        .layer-menu.open { display: block; opacity: 1; transform: translateY(0); }
        .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 800; font-size: 0.85rem; color: var(--text); margin-bottom: 4px; }
        .layer-item:last-child { margin-bottom: 0; }
        .layer-item:hover { background: rgba(0,0,0,0.03); }
        .layer-item.active { background: rgba(0,122,255,0.1); color: var(--accent); }
        .layer-dot { width: 14px; height: 14px; border-radius: 4px; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
        .layer-item.active .layer-dot::after { content: ''; width: 6px; height: 6px; background: currentColor; border-radius: 1px; }

        /* LABELS EN MAPA */
        .map-drive-label { background: none; border: none; padding: 0; font-weight: 900; font-size: 0.7rem; color: var(--text); box-shadow: none; white-space: nowrap; display: flex; align-items: center; gap: 3px; transform: translate(-50%, -50%); text-shadow: 0 0 5px #fff, 0 0 5px #fff, 0 0 5px #fff; pointer-events: none; }
        .map-drive-label i { font-size: 0.8rem; color: var(--accent); }

        .wizard-title { font-size: 1.8rem; font-weight: 900; text-align: center; }
        .wizard-title { font-size: 1.8rem; font-weight: 900; text-align: center; }
        .wizard-progress { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; }

        /* WIZARD ENCUADRE */
        .wizard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #fff; }
        .wizard-overlay.open { display: flex; }
        .wizard-card-preview { width: 350px; height: 180px; border-radius: 20px; overflow: hidden; position: relative; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,255,255,0.2); margin: 30px 0; }
        .wizard-card-preview img { width: 100%; height: 100%; object-fit: cover; cursor: ns-resize; }
        .wizard-controls { display: flex; gap: 20px; margin-top: 30px; }
        .wizard-btn { padding: 15px 40px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .wizard-btn.primary { background: var(--accent); color: #fff; }
        .wizard-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; }

        .auth-btn { background: var(--accent); color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; transform: scale(1.1); }

        /* PASSWORD WALL */
        .auth-overlay { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; padding: 20px; }
        .auth-overlay.hidden { display: none; }
        .auth-content { max-width: 400px; width: 100%; }
        .auth-input { width: 100%; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 1.5rem; letter-spacing: 5px; margin: 30px 0; outline: none; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; overflow-x: hidden; height: auto; }
            .left-panel { width: 100%; height: auto; border-right: none; overflow: visible; }
            .right-panel { width: 100%; height: 500px; order: 2; border-top: 1px solid rgba(0,0,0,0.05); }
            .task-list { padding-bottom: 40px; }
            .filter-switch-wrap { position: relative; }
            header { padding: 30px 20px 10px; }
            .day-strip { padding: 10px 20px; }
            .filter-switch { margin: 0 20px; }
            .task-list { padding: 0 20px 40px; }
            .layer-fab { top: 20px; right: 20px; }
            .layer-menu { top: 80px; right: 20px; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="filter-switch-wrap">
            <header>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1 style="font-weight:900; font-size:1.5rem; letter-spacing:-0.05em;">MADEIRA EXPLORER</h1>
                    <span id="p-text" style="font-size:0.9rem; font-weight:900; color:var(--accent);">0%</span>
                </div>
                <!-- AUTH -->
    <div id="auth-wall" class="auth-overlay">
        <div class="auth-content">
            <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;">MADEIRA TRIP</h1>
            <p style="opacity: 0.6;">Introduce la clave de acceso</p>
            <input type="password" id="pass-input" class="auth-input" placeholder="••••">
            <button class="auth-btn" onclick="checkPass()">ENTRAR</button>
        </div>
    </div>

    <div class="container"><div id="p-bar" class="prog-fill"></div></div>
            </header>

            <div class="day-strip">
                <button class="day-btn active" onclick="setDay(1)">Día 1</button>
                <button class="day-btn" onclick="setDay(2)">Día 2</button>
                <button class="day-btn" onclick="setDay(3)">Día 3</button>
                <button class="day-btn" onclick="setDay(4)">Día 4</button>
                <button class="day-btn" style="background:#f2f7ff; color:var(--accent);" onclick="showGast()"><i class="ph-bold ph-fork-knife"></i></button>
            </div>

            <div class="filter-switch">
                <button class="filter-btn active" onclick="setFilter('pending')" id="btn-pending">Pendientes</button>
                <button class="filter-btn" onclick="setFilter('done')" id="btn-done">Completados</button>
            </div>
        </div>

        <div id="t-list" class="task-list"></div>
    </div>

    <div class="right-panel">
        <div class="layer-fab" onclick="toggleLayerMenu()"><i class="ph-bold ph-list"></i></div>
        <div id="layer-menu" class="layer-menu">
            <div class="layer-item active" onclick="toggleDayLayer(1)" id="l-day-1">Día 1 <div class="layer-dot"></div></div>
            <div class="layer-item" onclick="toggleDayLayer(2)" id="l-day-2">Día 2 <div class="layer-dot"></div></div>
            <div class="layer-item" onclick="toggleDayLayer(3)" id="l-day-3">Día 3 <div class="layer-dot"></div></div>
            <div class="layer-item" onclick="toggleDayLayer(4)" id="l-day-4">Día 4 <div class="layer-dot"></div></div>
        </div>
        <div id="map"></div>
        <button class="crop-helper-btn" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:9000; background:#ff3b30; color:#fff; padding:15px 30px; border-radius:50px; font-weight:900; border:none; cursor:pointer;" onclick="startWizard()">MODO ENCUADRE WIZARD</button>
    </div>

    <!-- WIZARD -->
    <div id="wizard" class="wizard-overlay">
        <div class="wizard-title" id="wiz-title">ENCUADRE</div>
        <div class="wizard-card-preview">
            <img id="wiz-img" src="" style="object-position: 50% 50%;">
        </div>
        <p style="opacity:0.7; font-size:0.9rem;">Arrastra la foto arriba/abajo para encuadrar</p>
        <div class="wizard-controls">
            <button class="wizard-btn secondary" onclick="wizPrev()">ANTERIOR</button>
            <button class="wizard-btn primary" onclick="wizNext()" id="wiz-next-btn">SIGUIENTE</button>
        </div>
        <div class="wizard-progress" id="wiz-prog">0 / 0</div>
        <button class="wizard-btn" style="margin-top:50px; background:none; color:red;" onclick="closeWizard()">CERRAR Y CANCELAR</button>
    </div>

    <!-- MODAL DE DETALLES -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-banner"><img id="modal-img" src="" alt=""></div>
            <div class="modal-padding">
                <div class="modal-header">
                    <div>
                        <div id="modal-time" style="font-weight:900; color:var(--accent); font-size:0.75rem; text-transform:uppercase; margin-bottom:5px; background:rgba(0,122,255,0.1); padding:4px 10px; border-radius:50px; display:inline-block;">06:05 AM</div>
                        <h2 class="modal-title" id="modal-title">Título de la Tarea</h2>
                    </div>
                    <button onclick="closeModal()" style="border:none; background:#f2f2f7; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;"><i class="ph-bold ph-x" style="font-size:1rem;"></i></button>
                </div>
                <div id="modal-warning" class="modal-warning" style="display:none;"><i class="ph-bold ph-warning-circle"></i> <span id="warn-text"></span></div>
                <p class="modal-desc" id="modal-desc"></p>
                <div style="display:flex; gap:12px; margin-top:5px;">
                    <button id="modal-btn-check" class="day-btn" style="flex:1; background:var(--nature); color:#fff; font-size:1rem; padding:18px; border-radius:18px; font-weight:900;">Completar</button>
                    <a id="modal-btn-map" href="#" target="_blank" class="day-btn" style="background:var(--accent); color:#fff; width:60px; display:flex; align-items:center; justify-content:center; padding:0; text-decoration:none; border-radius:18px;"><i class="ph-bold ph-navigation-arrow" style="font-size:1.4rem;"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL GASTRONÓMICO -->
    <div class="modal-overlay" id="gastOverlay" onclick="closeGastModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-banner"><img src="https://images.unsplash.com/photo-1551218808-94e220e084d2?q=80&w=800" alt=""></div>
            <div class="modal-padding">
                <div class="modal-header">
                    <div>
                        <div style="font-weight:900; color:var(--accent); font-size:0.75rem; text-transform:uppercase; margin-bottom:5px; background:rgba(0,122,255,0.1); padding:4px 10px; border-radius:50px; display:inline-block;">Madeira Guide</div>
                        <h2 class="modal-title">Guía Gastronómica</h2>
                    </div>
                    <button onclick="closeGastModal()" style="border:none; background:#f2f2f7; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;"><i class="ph-bold ph-x" style="font-size:1rem;"></i></button>
                </div>
                <div id="gast-list" style="display:flex; flex-direction:column; gap:12px; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        const itinerary = [
            { d: 1, pts: [
                { id: "d1-v", t: "06:05", title: "Vuelo desde Oporto", drive: "18min", lat: 32.693, lng: -16.772, desc: "Llegada a Madeira a las 08:10. Traslado al alojamiento en coche (18 min). Dejar maletas si es posible antes de empezar la ruta.", img: "29089B4C-19DB-4A5B-8622-99814F831BDC.JPG", pos: "50% 44.5%" },
                { id: "d1-centro", t: "MAÑANA", title: "Casco Antiguo & Street Art", drive: "12min", lat: 32.648, lng: -16.908, desc: "Paseo por el centro de Funchal. Visita a la Rua de Santa Maria para ver el famoso street art en las puertas. Imprescindible Mercado dos Lavradores (45 min).", img: "4EED64A0-30E2-4F0D-910B-69D69BC53E6F.JPG", pos: "50% 69.5%" },
                { id: "d1-cr7", t: "12:00", title: "Museo CR7 + Estatua", drive: "6min", lat: 32.644, lng: -16.914, desc: "Visita al Museu CR7 (45-60 min). Fotos con la estatua de bronce de Cristiano Ronaldo en la entrada del puerto.", img: "85703FCB-DAC9-464F-88E0-9A36A7FFE807.JPG", pos: "50% 20%" },
                { id: "d1-comida", t: "14:00", title: "Bela 5 Snack Bar (10/10)", drive: "5min", lat: 32.648, lng: -16.904, desc: "Almuerzo recomendado por Claudia. Especialidades locales en el corazón del casco antiguo.", img: "874607AC-121D-4A62-9BF5-00C907BB78F9.JPG", pos: "50% 31.5%" },
                { id: "d1-monte", t: "16:00", title: "Teleférico a Monte", drive: "15min", lat: 32.675, lng: -16.903, warn: "NO SUBIR EN COCHE. Muy empinado y peligroso.", desc: "Subida al barrio alto para vistas aire fresco. Paseo por los Jardines Monte Palace (1h 15min – 1h 30min).", img: "9eedef67-584a-4ea6-80e6-09b82c6103fa.JPG", pos: "50% 41.5%" },
                { id: "d1-bajada", t: "18:00", title: "Bajada en Carros de Cesto", drive: "5min", lat: 32.665, lng: -16.905, desc: "Bajada tradicional en cestas de mimbre (Carreiros do Monte). Experiencia única.", img: "A7E8E74E-4890-42BF-ABC5-79DEE3797BA4.JPG", pos: "50% 48%" },
                { id: "d1-cena", t: "NOCHE", title: "Beer Garden (Nikita)", drive: "10min", lat: 32.643, lng: -16.911, desc: "Cena en Funchal. Probada obligatoria de la Nikita (bebida típica con helado) en el Beer Garden.", img: "CA917D3B-EBE7-4E9B-864C-36142A224EA4.JPG", pos: "50% 20%" }
            ]},
            { d: 2, pts: [
                { id: "d2-barco", t: "09:00", title: "Avistamiento de Cetáceos", drive: "5min", lat: 32.643, lng: -16.911, desc: "Excursión en barco (3h) desde el puerto de Funchal para ver delfines, ballenas y tortugas marinas.", img: "FullSizeRender.jpg", pos: "50% 46%" },
                { id: "d2-areeiro", t: "TARDE", title: "Pico do Areeiro", drive: "45min", lat: 32.735, lng: -16.928, desc: "Tercer pico más alto de Madeira. Paseo por la ruta hasta el mirador principal (1h 30 min aprox). Vistas sobre las nubes.", img: "IMG_0348.JPG", pos: "50% 32.5%" },
                { id: "d2-cristo", t: "17:30", title: "Cristo Rei Garajau", drive: "35min", lat: 32.636, lng: -16.852, desc: "Estatua majestuosa similar a la de Brasil con mirador espectacular al Atlántico.", img: "IMG_1565.jpg", pos: "50% 91.5%" },
                { id: "d2-porto", t: "18:30", title: "Porto da Cruz", drive: "22min", lat: 32.776, lng: -16.829, desc: "Pueblo para surfear o bañarse en sus piscinas frente al mar. Imprescindible bikini y toalla.", img: "IMG_2330.jpg", pos: "50% 40.5%" }
            ]},
            { d: 3, pts: [
                { id: "d3-girao", t: "09:00", title: "Cabo Girão Skywalk", drive: "22min", lat: 32.656, lng: -17.006, desc: "Pasarela de cristal a 580m de altura. Uno de los acantilados más altos del mundo. Fotos espectaculares (30 min).", img: "IMG_2463.jpg", pos: "50% 72%" },
                { id: "d3-camara", t: "10:00", title: "Cámara de Lobos", drive: "10min", lat: 32.649, lng: -16.974, desc: "Puerto de pescadores tradicional. Paseo por la bahía y café (30 min). Muy pintoresco.", img: "IMG_2697.jpg", pos: "50% 39%" },
                { id: "d3-ponta", t: "11:00", title: "Ponta do Sol", drive: "19min", lat: 32.678, lng: -17.106, desc: "Pueblo costero precioso, calles empedradas y casitas coloridas. Paseo, fotos y café opcional.", img: "IMG_3488.jpg", pos: "50% 16.5%" },
                { id: "d3-anjos", t: "12:00", title: "Cascata dos Anjos", drive: "8min", lat: 32.686, lng: -17.114, desc: "La famosa cascata que cae sobre la carretera antigua. Parada rápida para fotos.", img: "IMG_4071.JPG", pos: "50% 72.5%" },
                { id: "d3-tuneles", t: "13:00", title: "Túneles ER101", drive: "46min", lat: 32.75, lng: -17.15, desc: "Carretera antigua, fotos (15–20 min).", img: "IMG_4401.jpg", pos: "50% 45.5%" },
                { id: "d3-seixal", t: "14:00", title: "Praia do Seixal", drive: "25min", lat: 32.825, lng: -17.103, desc: "Paseo por arena negra, fotos (45–60 min). Paisaje espectacular.", img: "IMG_5173.jpg", pos: "50% 0%" },
                { id: "d3-noiva", t: "15:30", title: "Véu da Noiva", drive: "6min", lat: 32.818, lng: -17.142, desc: "Mirador rápido 15–20 min a la cascada que cae al mar.", img: "IMG_5886.jpg", pos: "50% 62%" },
                { id: "d3-comida", t: "16:00", title: "Bar Praia de Laje", drive: "5min", lat: 32.828, lng: -17.181, desc: "Recomendado por Claudia. Snack rápido, SOLO PESCADO.", img: "IMG_6097.jpg", pos: "50% 67%" },
                { id: "d3-moniz", t: "17:00", title: "Piscinas Porto Moniz", drive: "15min", lat: 32.868, lng: -17.172, desc: "Bañarse en las famosas piscinas naturales de lava volcánica (1h 30 min).", img: "IMG_6166.jpg", pos: "50% 38.5%" },
                { id: "d3-achadas", t: "19:00", title: "Achadas da Cruz", drive: "20min", lat: 32.852, lng: -17.208, desc: "Teleférico más empinado de Europa. Vistas salvajes y preciosas (45-60 min). 100% recomendado.", img: "IMG_6267.PNG", pos: "50% 15%" },
                { id: "d3-cena", t: "OPCIONAL", optional: true, title: "Cena en Funchal", drive: "1h20", lat: 32.643, lng: -16.911, desc: "Regreso a Funchal y cena si hay energía suficiente.", img: "IMG_6474.jpg", pos: "50% 55%" }
            ]},
            { d: 4, pts: [
                { id: "d4-sl", t: "09:00", title: "Ponta de São Lourenço", drive: "39min", lat: 32.743, lng: -16.701, desc: "Caminata ligera por la península volcánica este. Miradores espectaculares (1-2h).", img: "IMG_6877.jpg", pos: "50% 26.5%" },
                { id: "d4-guindaste", t: "OPCIONAL", optional: true, title: "Miradouro do Guindaste", drive: "15min", lat: 32.812, lng: -16.85, desc: "Mirador de cristal sobre el mar. Opcional si hay tiempo.", img: "IMG_6923.jpg", pos: "50% 38.5%" },
                { id: "d4-st", t: "11:30", title: "Casas Típicas de Santana", drive: "32min", lat: 32.805, lng: -16.883, desc: "Visita a las famosas casas triangulares de techo de paja. Fotos 30-45 min.", img: "c682455c-cff4-4cda-9da0-4090cccea1af.JPG", pos: "50% 50%" },
                { id: "d4-comida", t: "13:00", title: "Comida Cabo Aéreo", drive: "10min", lat: 32.812, lng: -16.892, warn: "RESERVAR OBLIGATORIO.", desc: "Almuerzo cerca de Santana con vistas al acantilado.", img: "IMG_7300.jpg", pos: "50% 52%" },
                { id: "d4-fanal", t: "15:00", title: "Fanal Forest", drive: "50min", lat: 32.808, lng: -17.141, desc: "Bosque de laurisilva milenario. Paseo entre vacas y árboles mágicos.", img: "IMG_8672.jpg", pos: "50% 36.5%" },
                { id: "d4-tir", t: "17:30", title: "Tirolina Ribeira Janela", drive: "56min", lat: 32.85, lng: -17.15, warn: "CIERRA A LAS 19:00.", desc: "Aventura en tirolina. Experiencia única antes de que cierren.", img: "IMG_8892.jpg", pos: "50% 50%" },
                { id: "d4-faja", t: "OPCIONAL", optional: true, title: "Fajã do Rodrigues", drive: "39min", lat: 32.78, lng: -17.03, desc: "Mini caminata si todavía queda energía y tiempo.", img: "IMG_8917.jpg", pos: "50% 60%" },
                { id: "d4-vuelta", t: "NOCHE", title: "Regreso a Funchal", drive: "1h20", lat: 32.643, lng: -16.911, desc: "Vuelta al alojamiento tras un día intenso.", img: "a3f600ad-d021-48c7-bab0-d3954e88adc6.JPG", pos: "50% 26%" }
            ]}
        ];

        const gastronomy = [
            { n: "Bela 5 Snack Bar", t: "Casco Antiguo", d: "El favorito de Claudia. 10/10. Prueba la Picadinha.", l: "https://maps.google.com/?q=Bela+5+Snack+Bar+Madeira", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b" },
            { n: "Vila do Peixe", t: "Câmara de Lobos", d: "Pescado fresco con vistas al puerto. Muy top.", l: "https://maps.google.com/?q=Vila+do+Peixe+Madeira", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b" },
            { n: "Abrigo do Pastor", t: "Camacha", d: "Lugar rústico para la mejor Espetada tradicional.", l: "https://maps.google.com/?q=Abrigo+do+Pastor+Madeira", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b" },
            { n: "Casa de Pasto Justiniano", t: "Seixal", d: "Comida casera en un entorno mágico entre montañas.", l: "https://maps.google.com/?q=Casa+de+Pasto+Justiniano+Madeira", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b" },
            { n: "Taberna da Poncha", t: "Serra de Água", d: "La mejor Poncha de la isla. Imprescindible.", l: "https://maps.google.com/?q=Taberna+da+Poncha+Madeira", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b" }
        ];

        let doneIds = JSON.parse(localStorage.getItem('mp_v10')) || {};
        let activeD = 1;
        let activeFilter = 'pending';
        let visibleDays = { 1: true };
        const dayColors = {
            1: '#007aff', // Blue
            2: '#ff9500', // Orange
            3: '#ff2d55', // Red/Pink
            4: '#5856d6'  // Purple
        };

        const map = L.map('map', { zoomControl: false }).setView([32.75, -16.95], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        let rLayer = L.layerGroup().addTo(map);
        let mLayer = L.layerGroup().addTo(map);

        function setDay(n) { 
            activeD = n; 
            visibleDays = { [n]: true }; // Seteamos solo el día actual al cambiar
            updateLayerView();
            render(); 
        }

        function toggleLayerMenu() { document.getElementById('layer-menu').classList.toggle('open'); }

        function toggleDayLayer(n) {
            visibleDays[n] = !visibleDays[n];
            updateLayerView();
            drawRealMap();
        }

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            // Clave personalizada: 4MADEIRA
            if(input.toUpperCase() === '4MADEIRA') {
                document.getElementById('auth-wall').classList.add('hidden');
                init();
                // Guardar en sesión para no pedir siempre
                sessionStorage.setItem('mp_auth', 'true');
            } else {
                alert('Clave incorrecta');
            }
        }

        function initAuth() {
            if(sessionStorage.getItem('mp_auth') === 'true') {
                document.getElementById('auth-wall').classList.add('hidden');
                init();
            }
        }

        window.onload = initAuth;

        function init() {
            drawRealMap();
            setDay(1);
        }
        function updateLayerView() {
            for(let d=1; d<=4; d++) {
                const el = document.getElementById(`l-day-${d}`);
                if(el) el.classList.toggle('active', !!visibleDays[d]);
            }
        }

        function setFilter(f) { 
            activeFilter = f; 
            document.getElementById('btn-pending').classList.toggle('active', f === 'pending');
            document.getElementById('btn-done').classList.toggle('active', f === 'done');
            render(); 
        }

        function render() {
            const list = document.getElementById('t-list'); list.innerHTML = '';
            document.querySelectorAll('.day-btn').forEach((b,i)=> b.classList.toggle('active', i+1 === activeD));
            
            const day = itinerary.find(d => d.d === activeD);
            const filtered = day.pts.filter(p => activeFilter === 'pending' ? !doneIds[p.id] : doneIds[p.id]);

            if(filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:100px 40px; color:var(--sub); font-weight:800; font-size:1rem; opacity:0.5;">TODO LISTO EN ESTA SECCIÓN</div>`;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = `task-card ${doneIds[p.id]?'done':''} ${p.optional?'optional':''}`;
                card.setAttribute('data-id', p.id);
                card.onclick = () => { if(!document.getElementById('wizard').classList.contains('open')) openModal(p); };
                const finalImg = p.img.startsWith('http') ? `${p.img}?auto=format&fit=crop&q=80&w=800` : p.img;
                card.innerHTML = `
                    <img class="card-bg" src="${finalImg}" alt="${p.title}" style="object-position: ${p.pos || '50% 50%'}">
                    ${p.optional ? '<div class="optional-tag">Opcional</div>' : ''}
                    <div class="btn-check-quick" onclick="event.stopPropagation(); toggle('${p.id}')"><i class="ph-bold ph-check"></i></div>
                    <a href="https://maps.google.com/?daddr=${encodeURIComponent(p.title+', Madeira')}" target="_blank" class="btn-map-quick" onclick="event.stopPropagation()"><i class="ph-bold ph-navigation-arrow"></i></a>
                    ${p.drive ? `<div class="drive-tag"><i class="ph-bold ph-car"></i> ${p.drive}</div>` : ''}
                    <div class="card-content" style="position:absolute; bottom:0; left:0; right:0; z-index:5;">
                        <div class="card-meta"><span><i class="ph-bold ph-clock"></i> ${p.t}</span></div>
                        <div class="card-title">${p.title}</div>
                    </div>
                `;
                list.appendChild(card);
            });
            updateProg(); drawRealMap();
        }

        function drawRealMap() {
            rLayer.clearLayers(); mLayer.clearLayers();
            const allCoords = [];
            
            itinerary.forEach(day => {
                if(!visibleDays[day.d]) return;
                const dColor = dayColors[day.d] || '#007aff';
                
                // Líneas por día
                for(let i=1; i<day.pts.length; i++) {
                    const p1 = day.pts[i-1]; const p2 = day.pts[i];
                    const isTraversed = doneIds[p2.id];
                    L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], {
                        color: isTraversed ? '#34c759' : dColor,
                        weight: 4, opacity: isTraversed ? 0.7 : 0.3, dashArray: isTraversed ? '' : '5,10'
                    }).addTo(rLayer);

                    // Etiqueta de tiempo en el punto medio
                    if(p2.drive) {
                        const midLat = (p1.lat + p2.lat) / 2;
                        const midLng = (p1.lng + p2.lng) / 2;
                        L.marker([midLat, midLng], {
                            icon: L.divIcon({
                                className: 'map-drive-icon',
                                html: `<div class="map-drive-label"><i class="ph-bold ph-car"></i>${p2.drive}</div>`,
                                iconSize: [0, 0],
                                iconAnchor: [0, 0]
                            })
                        }).addTo(rLayer);
                    }
                }
                
                day.pts.forEach(p => {
                    const isDone = doneIds[p.id];
                    const baseColor = p.optional ? '#FFCC00' : dColor;
                    const color = isDone ? '#34c759' : baseColor;
                    const marker = L.circleMarker([p.lat, p.lng], {
                        radius: isDone ? 7 : 9,
                        fillColor: color,
                        color: '#fff', weight: 3, fillOpacity: 0.95
                    }).addTo(mLayer);
                    marker.bindTooltip(`D${day.d}: ${p.title}`, { permanent: false, direction: 'top', className: 'map-label-real' });
                    marker.on('click', () => openModal(p));
                    allCoords.push([p.lat, p.lng]);
                });
            });
            
            if(allCoords.length > 0) map.fitBounds(L.polyline(allCoords).getBounds(), { padding: [60, 60] });
        }

        function toggle(id) {
            doneIds[id] = !doneIds[id];
            localStorage.setItem('mp_v10', JSON.stringify(doneIds));
            render();
        }

        // WIZARD LOGIC
        let wizList = [];
        let wizIdx = 0;
        let wizResults = {};

        function startWizard() {
            wizList = [];
            itinerary.forEach(d => d.pts.forEach(p => {
                wizList.push(p);
                if(p.pos) wizResults[p.id] = p.pos;
            }));
            wizIdx = 0;
            document.getElementById('wizard').classList.add('open');
            updateWiz();
        }

        function updateWiz() {
            const p = wizList[wizIdx];
            document.getElementById('wiz-title').innerText = p.title;
            const img = document.getElementById('wiz-img');
            const finalImg = p.img.startsWith('http') ? `${p.img}?auto=format&fit=crop&q=80&w=800` : p.img;
            img.src = finalImg;
            img.style.objectPosition = wizResults[p.id] || "50% 50%";
            document.getElementById('wiz-prog').innerText = `${wizIdx + 1} de ${wizList.length}`;
            document.getElementById('wiz-next-btn').innerText = (wizIdx === wizList.length - 1) ? "FINALIZAR" : "SIGUIENTE";
        }

        function wizNext() {
            const p = wizList[wizIdx];
            wizResults[p.id] = document.getElementById('wiz-img').style.objectPosition;
            if(wizIdx < wizList.length - 1) {
                wizIdx++;
                updateWiz();
            } else {
                console.log("FINAL_POSITIONS:", JSON.stringify(wizResults, null, 2));
                alert("¡Completado! Copia el JSON de la consola si has hecho cambios.");
                closeWizard();
            }
        }

        function wizPrev() {
            if(wizIdx > 0) { wizIdx--; updateWiz(); }
        }

        function closeWizard() { document.getElementById('wizard').classList.remove('open'); }

        // Drag en Wizard
        let wizDragging = false;
        let wizStartY, wizStartPosValue;
        const wizImgEl = document.getElementById('wiz-img');

        wizImgEl.addEventListener('mousedown', e => {
            wizDragging = true;
            wizStartY = e.clientY;
            const currentPos = wizImgEl.style.objectPosition || "50% 50%";
            wizStartPosValue = parseInt(currentPos.split(' ')[1]) || 50;
            e.preventDefault();
        });

        document.addEventListener('mousemove', e => {
            if(!wizDragging) return;
            const diff = (e.clientY - wizStartY) / 2;
            let val = wizStartPosValue + diff;
            if(val < 0) val = 0; if(val > 100) val = 100;
            wizImgEl.style.objectPosition = `50% ${val}%`;
        });

        document.addEventListener('mouseup', () => { wizDragging = false; });

        function openModal(p) {
            const mImg = document.getElementById('modal-img');
            const finalImg = p.img.startsWith('http') ? `${p.img}?auto=format&fit=crop&q=80&w=800` : p.img;
            if(mImg) {
                mImg.src = finalImg;
                mImg.style.objectPosition = p.pos || '50% 50%';
            }
            document.getElementById('modal-time').innerText = p.t;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.desc;
            const warn = document.getElementById('modal-warning');
            const warnText = document.getElementById('warn-text');
            if(p.warn) { warnText.innerText = p.warn; warn.style.display = 'flex'; } else { warn.style.display = 'none'; }
            
            const btn = document.getElementById('modal-btn-check');
            const isDone = doneIds[p.id];
            btn.innerText = isDone ? "Marcar Pendiente" : "Completar Tarea";
            btn.style.background = isDone ? "var(--apple-bg)" : "var(--nature)";
            btn.style.color = isDone ? "var(--text)" : "#fff";
            btn.onclick = () => { toggle(p.id); closeModal(); };
            
            document.getElementById('modal-btn-map').href = `https://maps.google.com/?daddr=${encodeURIComponent(p.title+', Madeira')}`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        function updateProg() {
            let tot = 0; itinerary.forEach(d=>tot+=d.pts.length);
            const done = Object.keys(doneIds).length;
            const p = Math.round((done/tot)*100);
            document.getElementById('p-bar').style.width = p+'%';
            document.getElementById('p-text').innerText = p+'%';
        }

        function showGast() {
            const list = document.getElementById('gast-list'); list.innerHTML = '';
            gastronomy.forEach(g => {
                const item = document.createElement('div');
                item.style.background = '#f9f9f9';
                item.style.padding = '20px';
                item.style.borderRadius = '20px';
                item.style.border = '1px solid rgba(0,0,0,0.03)';
                const gImg = g.img || 'https://images.unsplash.com/photo-1551218808-94e220e084d2';
                item.innerHTML = `
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div style="width:70px; height:70px; border-radius:12px; background-image:url('${gImg}?q=80&w=200'); background-size:cover; background-position:center; flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <div style="font-weight:900; font-size:1rem; color:var(--text);">${g.n}</div>
                            <div style="font-size:0.7rem; font-weight:800; color:var(--accent); text-transform:uppercase; margin-bottom:4px;">${g.t}</div>
                            <div style="font-size:0.8rem; color:var(--sub); line-height:1.3; font-weight:400;">${g.d}</div>
                        </div>
                        <a href="${g.l}" target="_blank" style="background:var(--accent); color:#fff; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;"><i class="ph-bold ph-navigation-arrow"></i></a>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('gastOverlay').classList.add('open');
        }
        function closeGastModal() { document.getElementById('gastOverlay').classList.remove('open'); }
        setDay(1);
    </script>
</body>
</html>
