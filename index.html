<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madeira Pro 2026 | Full Detail & Workflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --apple-bg: #f5f5f7; --accent: #007aff; --nature: #34c759; --text: #1d1d1f; --sub: #86868b; --glass: rgba(255, 255, 255, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Outfit', sans-serif; background: var(--apple-bg); height: 100vh; display: flex; overflow: hidden; }
        
        .left-panel { width: 450px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,0.08); overflow-y: auto; z-index: 1000; position: relative; }
        .right-panel { flex: 1; height: 100vh; position: relative; z-index: 500; }
        
        header { padding: 40px 30px 20px; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .day-strip { display: flex; gap: 8px; padding: 20px 30px; overflow-x: auto; scrollbar-width: none; background: #fff; position: sticky; top: 120px; z-index: 90; margin-top: -1px; }
        .day-btn { padding: 12px 22px; background: #f2f2f7; border-radius: 50px; font-weight: 800; font-size: 0.8rem; border: none; cursor: pointer; white-space: nowrap; transition: 0.3s; color: var(--sub); }
        .day-btn.active { background: var(--text); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        /* FILTRO PENDIENTE / COMPLETADO */
        .filter-switch { display: flex; background: #f2f2f7; padding: 4px; border-radius: 12px; margin: 0 30px 20px; }
        .filter-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 800; font-size: 0.75rem; border-radius: 10px; cursor: pointer; transition: 0.2s; color: var(--sub); }
        .filter-btn.active { background: #fff; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .task-list { padding: 0 30px 120px; display: flex; flex-direction: column; gap: 15px; }
        .task-card { position: relative; height: 140px; border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); background-size: cover; background-position: center; border: 1px solid rgba(0,0,0,0.05); }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .task-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 80%); }
        
        .card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; z-index: 2; color: #fff; }
        .card-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 2px; }
        .card-meta { font-size: 0.65rem; font-weight: 800; opacity: 0.9; display: flex; gap: 10px; align-items: center; }

        .btn-check-quick { position: absolute; top: 15px; left: 15px; width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; z-index: 10; color: transparent; transition: 0.3s; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .task-card.done .btn-check-quick { background: var(--nature); border-color: var(--nature); color: #fff; }
        .btn-map-quick { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 10; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); }

        /* MODAL DE DETALLES */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-content { width: 100%; max-width: 500px; background: #fff; border-radius: 35px 35px 0 0; padding: 40px 30px; position: relative; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .modal-title { font-size: 1.9rem; font-weight: 950; line-height: 1.1; margin-bottom: 10px; letter-spacing: -0.05em; }
        .modal-desc { font-size: 1rem; color: var(--text); line-height: 1.6; background: #f9f9f9; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); font-weight: 400; }
        .modal-warning { background: #fff1f0; color: #cf222e; padding: 15px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 20px; border: 1px solid #ffd8d6; display: flex; align-items: center; gap: 10px; }

        /* REAL MAP */
        #map { width: 100%; height: 100%; filter: grayscale(0.2) contrast(1.1); }
        .map-label-real { background: #fff; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: 'Outfit', sans-serif; font-weight: 950; font-size: 9px; text-transform: uppercase; color: #1d1d1f; padding: 4px 12px; opacity: 0.95; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="left-panel">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1 style="font-weight:900; font-size:1.5rem; letter-spacing:-0.05em;">MADEIRA EXPLORER</h1>
                <span id="p-text" style="font-size:0.9rem; font-weight:900; color:var(--accent);">0%</span>
            </div>
            <div class="prog-container"><div id="p-bar" class="prog-fill"></div></div>
        </header>

        <div class="day-strip">
            <button class="day-btn active" onclick="setDay(1)">Día 1</button>
            <button class="day-btn" onclick="setDay(2)">Día 2</button>
            <button class="day-btn" onclick="setDay(3)">Día 3</button>
            <button class="day-btn" onclick="setDay(4)">Día 4</button>
            <button class="day-btn" style="background:#f2f7ff; color:var(--accent);" onclick="showGast()"><i class="ph-bold ph-fork-knife"></i></button>
        </div>

        <div class="filter-switch">
            <button class="filter-btn active" onclick="setFilter('pending')" id="btn-pending">Pendientes</button>
            <button class="filter-btn" onclick="setFilter('done')" id="btn-done">Completados</button>
        </div>

        <div id="t-list" class="task-list"></div>
    </div>

    <div class="right-panel">
        <div id="map"></div>
    </div>

    <!-- MODAL DE DETALLES -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div id="modal-time" style="font-weight:900; color:var(--accent); font-size:0.8rem; text-transform:uppercase; margin-bottom:5px;">06:05 AM</div>
                    <h2 class="modal-title" id="modal-title">Título de la Tarea</h2>
                </div>
                <button onclick="closeModal()" style="border:none; background:#f2f2f7; width:45px; height:45px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;"><i class="ph-bold ph-x" style="font-size:1.2rem;"></i></button>
            </div>
            <div id="modal-warning" class="modal-warning" style="display:none;"><i class="ph-bold ph-warning-circle"></i> <span id="warn-text"></span></div>
            <p class="modal-desc" id="modal-desc"></p>
            <div style="display:flex; gap:12px; margin-top:10px;">
                <button id="modal-btn-check" class="day-btn" style="flex:1; background:var(--nature); color:#fff; font-size:1.1rem; padding:20px; border-radius:20px;">Completar</button>
                <a id="modal-btn-map" href="#" target="_blank" class="day-btn" style="background:var(--accent); color:#fff; width:65px; display:flex; align-items:center; justify-content:center; padding:0; text-decoration:none; border-radius:20px;"><i class="ph-bold ph-navigation-arrow" style="font-size:1.6rem;"></i></a>
            </div>
        </div>
    </div>

    <script>
        const itinerary = [
            { d: 1, pts: [
                { id: "d1-v", t: "06:05", title: "Vuelo desde Oporto", lat: 32.693, lng: -16.772, desc: "Llegada a Madeira a las 08:10. Traslado al alojamiento en coche (15-20 min). Dejar maletas si es posible antes de empezar la ruta.", img: "https://images.unsplash.com/photo-1554101150-84f932df225e?q=80&w=800" },
                { id: "d1-centro", t: "MAÑANA", title: "Casco Antiguo & Street Art", lat: 32.648, lng: -16.908, desc: "Paseo por el centro de Funchal. Visita a la Rua de Santa Maria para ver el famoso street art en las puertas. Imprescindible Mercado dos Lavradores (45 min) para ver los puestos de flores y frutas exóticas.", img: "https://images.unsplash.com/photo-1628080644347-19d26852bb07?q=80&w=800" },
                { id: "d1-cr7", t: "12:00", title: "Museo CR7 + Estatua", lat: 32.644, lng: -16.914, desc: "Visita al Museu CR7 (45-60 min). Fotos con la estatua de bronce de Cristiano Ronaldo en la entrada del puerto.", img: "https://images.unsplash.com/photo-1620311316492-c2830f3c5597?q=80&w=800" },
                { id: "d1-comida", t: "14:00", title: "Bela 5 Snack Bar (10/10)", lat: 32.648, lng: -16.904, desc: "Almuerzo recomendado por Claudia. Especialidades locales en el corazón del casco antiguo.", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?q=80&w=800" },
                { id: "d1-monte", t: "16:00", title: "Teleférico a Monte", lat: 32.675, lng: -16.903, warn: "NO SUBIR EN COCHE. Muy empinado y peligroso.", desc: "Subida al barrio alto para vistas aire fresco. Paseo por los Jardines Monte Palace (1h 15min – 1h 30min). Disfruta de la paz y el arte oriental.", img: "https://images.unsplash.com/photo-1628080644128-4bc2e38c92b2?q=80&w=800" },
                { id: "d1-bajada", t: "18:00", title: "Bajada en Carros de Cesto", lat: 32.665, lng: -16.905, desc: "Bajada tradicional en cestas de mimbre (Carreiros do Monte). Experiencia única. Luego paseo chill por el puerto al atardecer.", img: "https://images.unsplash.com/photo-1518155317743-a8ff43ea6f5f?q=80&w=800" },
                { id: "d1-cena", t: "NOCHE", title: "Beer Garden (Nikita)", lat: 32.643, lng: -16.911, desc: "Cena en Funchal. Probada obligatoria de la Nikita (bebida típica con helado) en el Beer Garden.", img: "https://images.unsplash.com/photo-1546173159-315724a31696?q=80&w=800" }
            ]},
            { d: 2, pts: [
                { id: "d2-barco", t: "09:00", title: "Avistamiento de Cetáceos", lat: 32.643, lng: -16.911, desc: "Excursión en barco (3h) desde el puerto de Funchal para ver delfines, ballenas y tortugas marinas.", img: "https://images.unsplash.com/photo-1518155317743-a8ff43ea6f5f?q=80&w=800" },
                { id: "d2-areeiro", t: "TARDE", title: "Pico do Areeiro", lat: 32.735, lng: -16.928, desc: "Tercer pico más alto de Madeira. Paseo por la ruta hasta el mirador principal (1h 30 min aprox). Vistas sobre las nubes.", img: "https://images.unsplash.com/photo-1628080644128-4bc2e38c92b2?q=80&w=800" },
                { id: "d2-cristo", t: "17:30", title: "Cristo Rei Garajau", lat: 32.636, lng: -16.852, desc: "Estatua majestuosa similar a la de Brasil con mirador espectacular al Atlántico.", img: "https://images.unsplash.com/photo-1628080644024-bc7b36a7edc8?q=80&w=800" },
                { id: "d2-porto", t: "18:30", title: "Porto da Cruz", lat: 32.776, lng: -16.829, desc: "Pueblo para surfear o bañarse en sus piscinas frente al mar. Imprescindible bikini y toalla.", img: "https://images.unsplash.com/photo-1614777556730-e8869c9ff4c2?q=80&w=800" }
            ]},
            { d: 3, pts: [
                { id: "d3-girao", t: "09:30", title: "Cabo Girão Skywalk", lat: 32.656, lng: -17.006, desc: "Pasarela de cristal a 580m de altura. Uno de los acantilados más altos del mundo.", img: "https://images.unsplash.com/photo-1614777556730-e8869c9ff4c2?q=80&w=800" },
                { id: "d3-camara", t: "11:00", title: "Cámara de Lobos", lat: 32.649, lng: -16.974, desc: "Puerto de pescadores tradicional que inspiró a Churchill. Muy pintoresco.", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?q=80&w=800" },
                { id: "d3-ponta", t: "13:00", title: "Ponta do Sol", lat: 32.678, lng: -17.106, desc: "Pueblo con más sol de la isla. Visita a la Cascata dos Anjos que cae directamente sobre la carretera regional.", img: "https://images.unsplash.com/photo-1628080644347-19d26852bb07?q=80&w=800" },
                { id: "d3-seixal", t: "TARDE", title: "Seixal Beach", lat: 32.825, lng: -17.103, desc: "Playa de arena negra volcánica y piscinas naturales de roca negra. Paisaje de película.", img: "https://images.unsplash.com/photo-1590523278191-995ccd138e48?q=80&w=800" },
                { id: "d3-moniz", t: "16:30", title: "Porto Moniz", lat: 32.868, lng: -17.172, desc: "Bañarse en las piscinas naturales formadas por la lava volcánica. Famosas en todo el mundo.", img: "https://images.unsplash.com/photo-1614777556606-ba7b4f305ed9?q=80&w=800" },
                { id: "d3-achadas", t: "18:30", title: "Achadas da Cruz", lat: 32.852, lng: -17.208, desc: "Bajada en el teleférico más empinado de Europa a una pequeña aldea junto al mar.", img: "https://images.unsplash.com/photo-1628080644347-19d26852bb07?q=80&w=800" }
            ]},
            { d: 4, pts: [
                { id: "d4-sl", t: "09:00", title: "Ponta de São Lourenço", lat: 32.743, lng: -16.701, desc: "Caminata por la península este. Paisaje volcánico único sin vegetación alta (1-2h).", img: "https://images.unsplash.com/photo-1628080644024-bc7b36a7edc8?q=80&w=800" },
                { id: "d4-st", t: "12:00", title: "Casas Típicas de Santana", lat: 32.805, lng: -16.883, desc: "Las famosas casas triangulares con techo de paja. Visita corta para fotos (30-45 min).", img: "https://images.unsplash.com/photo-1628080644105-bc7b36a7edc8?q=80&w=800" },
                { id: "d4-comida", t: "14:00", title: "Almuerzo Cabo Aéreo", lat: 32.812, lng: -16.892, warn: "RESERVAR CABO AÉREO OBLIGATORIO.", desc: "Comida deliciosa con vistas al acantilado cerca de Santana.", img: "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?q=80&w=800" },
                { id: "d4-fanal", t: "16:00", title: "Fanal Forest", lat: 32.808, lng: -17.141, desc: "Bosque de laurisilva mágico (UNESCO). Si hay niebla, la experiencia es surrealista.", img: "https://images.unsplash.com/photo-1628080644347-19d26852bb07?q=80&w=800" },
                { id: "d4-tir", t: "17:30", title: "Ribeira da Janela & Tirolina", lat: 32.85, lng: -17.15, warn: "LA TIROLINA CIERRA A LAS 19:00.", desc: "Aventura extrema 2026. Tirolina y visita al mirador del Guindaste.", img: "https://images.unsplash.com/photo-1628080644128-4bc2e38c92b2?q=80&w=800" }
            ]}
        ];

        let doneIds = JSON.parse(localStorage.getItem('mp_v10')) || {};
        let activeD = 1;
        let activeFilter = 'pending';

        const map = L.map('map', { zoomControl: false }).setView([32.75, -16.95], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        let rLayer = L.layerGroup().addTo(map);
        let mLayer = L.layerGroup().addTo(map);

        function setDay(n) { activeD = n; render(); }
        function setFilter(f) { 
            activeFilter = f; 
            document.getElementById('btn-pending').classList.toggle('active', f === 'pending');
            document.getElementById('btn-done').classList.toggle('active', f === 'done');
            render(); 
        }

        function render() {
            const list = document.getElementById('t-list'); list.innerHTML = '';
            document.querySelectorAll('.day-btn').forEach((b,i)=> b.classList.toggle('active', i+1 === activeD));
            
            const day = itinerary.find(d => d.d === activeD);
            const filtered = day.pts.filter(p => activeFilter === 'pending' ? !doneIds[p.id] : doneIds[p.id]);

            if(filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:100px 40px; color:var(--sub); font-weight:800; font-size:1rem; opacity:0.5;">TODO LISTO EN ESTA SECCIÓN</div>`;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = `task-card ${doneIds[p.id]?'done':''}`;
                card.style.backgroundImage = `url('${p.img}')`;
                card.onclick = () => openModal(p);
                card.innerHTML = `
                    <div class="btn-check-quick" onclick="event.stopPropagation(); toggle('${p.id}')"><i class="ph-bold ph-check"></i></div>
                    <a href="https://maps.google.com/?daddr=${encodeURIComponent(p.title+', Madeira')}" target="_blank" class="btn-map-quick" onclick="event.stopPropagation()"><i class="ph-bold ph-navigation-arrow"></i></a>
                    <div class="card-content">
                        <div class="card-meta"><span><i class="ph-bold ph-clock"></i> ${p.t}</span></div>
                        <div class="card-title">${p.title}</div>
                    </div>
                `;
                list.appendChild(card);
            });
            updateProg(); drawRealMap();
        }

        function drawRealMap() {
            rLayer.clearLayers(); mLayer.clearLayers();
            const day = itinerary.find(d => d.d === activeD); if(!day) return;
            const coords = day.pts.map(p => [p.lat, p.lng]);
            const fullLine = L.polyline(coords, { color: '#007aff', weight: 3, opacity: 0.1, dashArray: '5,5' }).addTo(rLayer);
            
            day.pts.forEach(p => {
                const isDone = doneIds[p.id];
                const marker = L.circleMarker([p.lat, p.lng], {
                    radius: isDone ? 7 : 9,
                    fillColor: isDone ? '#34c759' : '#007aff',
                    color: '#fff', weight: 3, fillOpacity: 0.95
                }).addTo(mLayer);
                marker.bindTooltip(p.title, { permanent: false, direction: 'top', className: 'map-label-real' });
                marker.on('click', () => openModal(p));
            });
            if(coords.length > 0) map.fitBounds(fullLine.getBounds(), { padding: [80, 80] });
        }

        function toggle(id) {
            if(doneIds[id]) delete doneIds[id]; else { doneIds[id] = true; if(window.navigator.vibrate) window.navigator.vibrate(20); }
            localStorage.setItem('mp_v10', JSON.stringify(doneIds));
            render();
        }

        function openModal(p) {
            document.getElementById('modal-time').innerText = p.t;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.desc;
            const warn = document.getElementById('modal-warning');
            const warnText = document.getElementById('warn-text');
            if(p.warn) { warnText.innerText = p.warn; warn.style.display = 'flex'; } else { warn.style.display = 'none'; }
            
            const btn = document.getElementById('modal-btn-check');
            const isDone = doneIds[p.id];
            btn.innerText = isDone ? "Marcar como Pendiente" : "Completar Tarea";
            btn.style.background = isDone ? var(--apple-bg) : var(--nature);
            btn.style.color = isDone ? var(--text) : '#fff';
            btn.onclick = () => { toggle(p.id); closeModal(); };
            
            document.getElementById('modal-btn-map').href = `https://maps.google.com/?daddr=${encodeURIComponent(p.title+', Madeira')}`;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        function updateProg() {
            let tot = 0; itinerary.forEach(d=>tot+=d.pts.length);
            const done = Object.keys(doneIds).length;
            const p = Math.round((done/tot)*100);
            document.getElementById('p-bar').style.width = p+'%';
            document.getElementById('p-text').innerText = p+'%';
        }
        function showGast() { alert("Guía Gastronómica en desarrollo para v11. Accede clicando en el icono."); }
        setDay(1);
    </script>
</body>
</html>
